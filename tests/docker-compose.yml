# Integration test databases.
# Start before running integration tests:
#   docker-compose -f tests/docker-compose.yml up -d
#   ctest --test-dir build -L integration

services:

  mysql-primary:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: dbmesh
      MYSQL_PASSWORD: dbmesh_password
    ports:
      - "13306:3306"
    volumes:
      - ../docker/mysql-primary.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - ../docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "-prootpassword", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  mysql-replica:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "13307:3306"
    volumes:
      - ../docker/mysql-replica.cnf:/etc/mysql/conf.d/replication.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "-prootpassword", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    depends_on:
      mysql-primary:
        condition: service_healthy
